<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAO. TOKYO | Ultra-Creative</title>
    <!-- 業界標準の外部ライブラリ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #020205;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
            cursor: crosshair;
        }
        #root { min-height: 100vh; }
        
        /* 1. 環境テクスチャ：背景ノイズ */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 2. グローバル・グリッチ・アニメーション */
        .glitch-active {
            animation: glitch-anim 0.2s infinite;
            filter: contrast(1.5) hue-rotate(10deg);
        }
        @keyframes glitch-anim {
            0% { clip-path: inset(20% 0 30% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(10% 0 80% 0); transform: translate(-1px, 2px); }
            60% { clip-path: inset(50% 0 40% 0); transform: translate(1px, -2px); }
            80% { clip-path: inset(80% 0 5% 0); transform: translate(-2px, 0px); }
            100% { clip-path: inset(0 0 0 0); transform: translate(0); }
        }

        /* 3. 背景を飛翔するアトム（復活と強化） */
        .atom-hologram {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.4));
            will-change: transform, opacity;
        }
        @keyframes fly-atom-1 {
            0% { transform: translate(-30vw, 110vh) rotate(15deg) scale(0.3); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translate(110vw, -20vh) rotate(25deg) scale(0.6); opacity: 0; }
        }
        @keyframes fly-atom-2 {
            0% { transform: translate(-10vw, 130vh) rotate(5deg) scale(0.2); opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { transform: translate(120vw, 10vh) rotate(15deg) scale(0.4); opacity: 0; }
        }
        @keyframes fly-atom-3 {
            0% { transform: translate(110vw, 80vh) rotate(-15deg) scale(0.15) scaleX(-1); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translate(-30vw, 20vh) rotate(-25deg) scale(0.25) scaleX(-1); opacity: 0; }
        }
        .atom-1 { animation: fly-atom-1 18s linear infinite; width: 350px; }
        .atom-2 { animation: fly-atom-2 26s linear infinite; animation-delay: -5s; width: 250px; }
        .atom-3 { animation: fly-atom-3 32s linear infinite; animation-delay: -12s; width: 180px; }

        /* 4. インタラクティブ・アトム（右下） */
        .interactive-atom {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            cursor: pointer;
        }
        .atom-disc {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 255, 0.2);
            background: #000;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
        }
        .is-active .atom-disc {
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), inset 0 0 10px rgba(0, 255, 255, 0.3);
            transform: scale(1.1);
        }
        .atom-face-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            transition: opacity 0.5s ease;
        }
        .is-active .atom-face-img {
            animation: record-spin 10s linear infinite;
            opacity: 1;
        }
        @keyframes record-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 5. 走査線（スキャンライン） */
        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Hooks ---
        const useScramble = (text, delay = 0) => {
            const [val, setVal] = useState('');
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
            useEffect(() => {
                let frame = 0;
                const timer = setTimeout(() => {
                    const int = setInterval(() => {
                        setVal(text.split('').map((c, i) => {
                            if (c === ' ' || c === '.') return c;
                            return frame > (i + 5) ? c : chars[Math.floor(Math.random() * chars.length)];
                        }).join(''));
                        if (frame > text.length + 20) clearInterval(int);
                        frame++;
                    }, 40);
                }, delay);
                return () => clearTimeout(timer);
            }, [text, delay]);
            return val;
        };

        const useIntersection = () => {
            const ref = useRef(null);
            const [show, setShow] = useState(false);
            useEffect(() => {
                const obs = new IntersectionObserver(([e]) => {
                    if (e.isIntersecting) { setShow(true); obs.unobserve(e.target); }
                }, { threshold: 0.1 });
                if (ref.current) obs.observe(ref.current);
                return () => { if (ref.current) obs.unobserve(ref.current); };
            }, []);
            return [ref, show];
        };

        // --- Components ---
        const Background3D = () => {
            const mountRef = useRef(null);
            useEffect(() => {
                let renderer, scene, camera, stars, animationId;
                const init = () => {
                    const THREE = window.THREE;
                    scene = new THREE.Scene();
                    scene.fog = new THREE.FogExp2(0x020205, 0.0015);
                    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 2000);
                    camera.position.z = 600;
                    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    if (mountRef.current) mountRef.current.appendChild(renderer.domElement);
                    const starsGeo = new THREE.BufferGeometry();
                    const pos = new Float32Array(3000 * 3);
                    for(let i=0; i<9000; i++) pos[i] = (Math.random()-0.5)*2000;
                    starsGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                    stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ size: 1.2, color: 0xffffff, transparent: true, opacity: 0.5 }));
                    scene.add(stars);
                    const animate = () => {
                        animationId = requestAnimationFrame(animate);
                        stars.rotation.y += 0.0002;
                        renderer.render(scene, camera);
                    };
                    animate();
                };
                const check = setInterval(() => { if (window.THREE) { clearInterval(check); init(); } }, 100);
                return () => { clearInterval(check); cancelAnimationFrame(animationId); };
            }, []);
            return <div ref={mountRef} className="fixed inset-0 z-0 pointer-events-none" />;
        };

        const ProjectItem = ({ p, i }) => {
            const [ref, show] = useIntersection();
            const [m, setM] = useState({ x: 0, y: 0 });
            const [hover, setHover] = useState(false);
            const finalShow = i === 0 ? true : show;

            return (
                <div ref={ref} onMouseMove={e => {
                    const r = ref.current.getBoundingClientRect();
                    setM({ x: (e.clientX-r.left)/r.width-0.5, y: (e.clientY-r.top)/r.height-0.5 });
                    setHover(true);
                }} onMouseLeave={() => setHover(false)} className="w-full">
                    <div className="transition-all duration-[1.2s] ease-out" style={{ opacity: finalShow ? 1 : 0, transform: finalShow ? 'none' : 'translateY(80px)' }}>
                        <div className="relative overflow-hidden aspect-video bg-[#010103] rounded-sm shadow-[0_40px_80px_-20px_rgba(0,0,0,0.9)]" style={{
                            transform: `perspective(1500px) rotateX(${m.y*-8}deg) rotateY(${m.x*8}deg) scale(${hover?1.03:1})`,
                            transition: 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)'
                        }}>
                             <img src={p.img} className="w-full h-full object-contain opacity-95 group-hover:opacity-100 transition-opacity duration-700" />
                             {hover && (
                                <div className="absolute inset-0 mix-blend-screen opacity-60 pointer-events-none" style={{ transform: `translate(${m.x*40}px, ${m.y*40}px)` }}>
                                    <img src={p.img} className="w-full h-full object-contain" style={{ filter: 'sepia(1) hue-rotate(180deg) saturate(600%) brightness(1.2)' }} />
                                </div>
                             )}
                             <div className="scanlines" />
                        </div>
                        {/* 正確な均衡のためのマージン設定 mt-12 */}
                        <div className="mt-12 px-1">
                            <h3 className="text-2xl md:text-5xl font-black tracking-tighter uppercase group-hover:text-cyan-400 transition-colors duration-500">{p.title}</h3>
                            <p className="text-[10px] md:text-xs font-bold uppercase tracking-[0.4em] text-gray-500 mt-4 group-hover:text-gray-300 transition-colors">{p.type}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const AtomControl = () => {
            const [active, setActive] = useState(false);
            return (
                <div className={`interactive-atom ${active ? 'is-active' : ''}`} onClick={() => setActive(!active)}>
                    <div className="relative flex items-center justify-center">
                        <div className="atom-disc">
                            <img src="https://yielding-harlequin-rvt2qzd10l.edgeone.app/IMG_8212.png" className="atom-face-img" alt="" />
                        </div>
                        <div className="absolute -top-10 right-0 bg-white text-black text-[9px] font-black px-2 py-1 uppercase opacity-0 group-hover:opacity-100 transition-all whitespace-nowrap">
                            {active ? 'SYSTEM ON' : 'ACTIVATE'}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [glitch, setGlitch] = useState(false);
            const [mo, setMo] = useState({ x: 0, y: 0 });
            const n1 = useScramble("NAO.", 600);
            const n2 = useScramble("TOKYO", 1000);

            useEffect(() => {
                const move = e => setMo({ x: (e.clientX/window.innerWidth-0.5)*30, y: (e.clientY/window.innerHeight-0.5)*30 });
                window.addEventListener('mousemove', move);
                // 周期的なデジタルグリッチ
                const interval = setInterval(() => { if(Math.random() > 0.9) { setGlitch(true); setTimeout(() => setGlitch(false), 150); } }, 5000);
                return () => { window.removeEventListener('mousemove', move); clearInterval(interval); };
            }, []);

            const projects = [
                { title: "Dans le ciel de l’impression", type: "Impression, soleil levant", img: "https://fellow-gray-simpktqghk.edgeone.app/IMG_8201.jpeg" },
                { title: "Franchir l’angoisse", type: "Le Cri", img: "https://asleep-aquamarine-6xmvetmk0h.edgeone.app/IMG_8206.jpeg" },
                { title: "Échappée hors du temps", type: "La Persistance de la mémoire", img: "https://improved-amethyst-wepnn6hasa.edgeone.app/IMG_8207.jpeg" }
            ];

            return (
                <div className={`relative min-h-screen ${glitch ? 'glitch-active' : ''}`}>
                    <div className="noise-overlay" />
                    <Background3D />
                    
                    {/* 背景飛翔アトムの復活 */}
                    <div className="atom-hologram atom-1 opacity-20"><img src="https://yielding-harlequin-rvt2qzd10l.edgeone.app/IMG_8212.png" className="w-full" /></div>
                    <div className="atom-hologram atom-2 opacity-10"><img src="https://yielding-harlequin-rvt2qzd10l.edgeone.app/IMG_8212.png" className="w-full" /></div>
                    <div className="atom-hologram atom-3 opacity-15"><img src="https://yielding-harlequin-rvt2qzd10l.edgeone.app/IMG_8212.png" className="w-full" /></div>

                    <AtomControl />

                    <nav className="fixed top-0 w-full z-50 p-10 mix-blend-difference flex justify-between uppercase font-bold tracking-widest text-[10px]">
                        <span>N.</span>
                        <div className="text-right">
                            <p className="opacity-90">Bienvenue.</p>
                            <p className="opacity-40 text-[8px]">Sans raison particulière.</p>
                        </div>
                    </nav>

                    <header className="relative h-screen flex flex-col justify-end pb-32 px-10 md:px-20 pointer-events-none">
                        <div className="max-w-[1400px] mx-auto w-full pointer-events-auto" style={{ transform: `translate3d(${mo.x}px, ${mo.y}px, 0)` }}>
                            <p className="text-[10px] md:text-xs font-black uppercase tracking-[0.7em] mb-8 text-cyan-400 opacity-80">les aventuriers un peu fous</p>
                            <h1 className="text-[20vw] md:text-[18vw] leading-[0.75] font-black tracking-tighter uppercase select-none drop-shadow-2xl">
                                {n1}<br/>{n2}
                            </h1>
                        </div>
                    </header>

                    <main className="relative z-10 px-10 md:px-20 py-48 bg-gradient-to-b from-transparent via-[#020205]/80 to-[#020205]">
                        {/* 作品間の静寂を gap-y-64/80 で確保 */}
                        <div className="max-w-[1400px] mx-auto flex flex-col gap-y-64 md:gap-y-96">
                            {projects.map((p, i) => <ProjectItem key={i} p={p} i={i} />)}
                        </div>
                    </main>

                    <section className="relative z-10 py-80 px-10 text-center">
                        <h2 className="text-2xl md:text-5xl font-light leading-relaxed max-w-5xl mx-auto opacity-70">
                            J’ai un goût prononcé pour le chocolat, le curry, le hamburger, le whisky, le vin et l’art, sans oublier les aventuriers un peu fous.
                            <span className="block italic mt-16 text-white text-3xl md:text-4xl">Et vous, quels sont vos goûts ?</span>
                        </h2>
                    </section>

                    <footer className="relative z-10 py-64 px-10 border-t border-white/5 bg-[#020205]">
                        <div className="max-w-[1400px] mx-auto">
                            <p className="text-4xl md:text-8xl font-black uppercase tracking-tighter opacity-90 mb-20 hover:opacity-100 transition-opacity cursor-none">On se retrouvera dans nos rêves.</p>
                            <p className="text-[10px] opacity-20 uppercase tracking-[0.4em]">© {new Date().getFullYear()} NAO. TOKYO — Conçu dans le vide.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
